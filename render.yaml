services:
  - type: web
    name: portfolio-project
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/database.db
    disk:
      name: portfolio-data
      mountPath: /var/data
      sizeGB: 1
